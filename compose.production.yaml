services:
  db:
    ports: []

  redis:
    ports: []

  backend:
    ports: []
    environment:
      ENVIRONMENT: production

  frontend:
    ports: []
    environment:
      NODE_ENV: production

  nginx:
    ports:
      - "80:80"
      # Enable this mapping when terminating TLS directly on nginx.
      # - "443:443"

  # Optional Prometheus stack for metrics scraping and alerting.
  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    networks:
      - app
      - data

  # Optional Grafana for metrics dashboards when monitoring profile is enabled.
  grafana:
    image: grafana/grafana:11.3.0
    env_file:
      - ./infra/.env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    networks:
      - app

volumes:
  prometheus_data:
  grafana_data:

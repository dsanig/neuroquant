services:
  # PostgreSQL is the system-of-record database for portfolio, margin, and audit data.
  db:
    image: postgres:16.6-bookworm
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - data

  # Redis backs Celery broker/result backend and can be reused for short-lived cache workloads.
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - data

  # FastAPI serves all HTTP API endpoints for the control center.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
    ports: []
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    networks:
      - app
      - data

  # Celery worker executes asynchronous jobs (report generation, ingestion, reconciliations).
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "worker", "--loglevel=INFO"]
    env_file:
      - ./.env
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*worker' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - data

  # Celery beat scheduler triggers periodic workflows and scheduled control checks.
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "beat", "--loglevel=INFO"]
    env_file:
      - ./.env
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - data

  # Next.js frontend serves the internal analyst/trader UI.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env
      - ./frontend/.env.local
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode >= 200 && r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    restart: unless-stopped
    networks:
      - app

  # Nginx is the only intended edge entrypoint and reverse-proxies UI + API traffic.
  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app


  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - app
      - data

  grafana:
    image: grafana/grafana:11.3.0
    env_file:
      - ./infra/.env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me}
    volumes:
      - grafana_data:/var/lib/grafana
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    restart: unless-stopped
    networks:
      - app

volumes:
  postgres_data:
  redis_data:
  app_storage:
  prometheus_data:
  grafana_data:

networks:
  app:
    driver: bridge
  data:
    driver: bridge
    internal: true
